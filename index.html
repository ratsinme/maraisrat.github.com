<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>by rats</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            position: relative;
        }

        .box {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 10;
        }

        a {
            color: #7289da;
            font-size: 22px;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 28px;
        }

        .top-right-info {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #D3D3D3;
            padding: 15px;
            border-radius: 8px;
            width: fit-content;
            text-align: center;
            font-family: sans-serif;
            border: 1px solid #A9A9A9;
            color: #333;
        }

        .top-right-info .server-by { font-weight: bold; margin-bottom: 4px; }
        .top-right-info .loading-by { font-size: 0.9em; color: #555; }

        /* Hides the YouTube player so only audio is heard */
        .video-background {
            position: absolute;
            top: 0; left: 0;
            width: 1px; height: 1px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Hidden YouTube Embed for Audio -->
    <div class="video-background">
        <iframe width="100%" height="100%" 
            src="https://youtube.com" 
            allow="autoplay">
        </iframe>
    </div>

    <div class="box">
        <h1>Join the discord to get notified when I host the server</h1>
        <a href="https://discord.gg" target="_blank">
           https://discord.com/invite/37aBHKmG2U
        </a>
    </div>

    <div class="top-right-info">
        <div class="server-by">server by :matig</div>
        <div class="loading-by">loading by:ratsinme</div>
    </div>

</body>
</html>
