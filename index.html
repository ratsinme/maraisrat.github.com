<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>by rats</title>
    <style>
        /* ADDED: pointer-events ensure the body doesn't block the link */
        body { 
            background-color: #111; 
            color: #fff; 
            font-family: Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center; 
            position: relative;
            overflow: hidden;
        }
        
        /* UPDATED: Increased z-index and added pointer-events */
        .box { 
            background: rgba(255, 255, 255, 0.05); 
            padding: 40px; 
            border-radius: 10px; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            position: relative;
            z-index: 9999; 
            pointer-events: auto;
        }

        /* UPDATED: Added block display and padding to make the clickable area BIGGER */
        a { 
            color: #7289da; 
            font-size: 22px; 
            text-decoration: none; 
            font-weight: bold; 
            display: inline-block;
            padding: 10px;
            cursor: pointer !important; /* Forces the hand icon */
        }
        
        a:hover { text-decoration: underline; color: #ffffff; }
        
        h1 { margin-bottom: 20px; font-size: 28px; }
        
        .top-right-info { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            background-color: #D3D3D3; 
            padding: 15px; 
            border-radius: 8px; 
            width: fit-content; 
            text-align: center; 
            font-family: sans-serif; 
            border: 1px solid #A9A9A9; 
            color: #333; 
            z-index: 5;
        }
        
        .top-right-info .server-by { font-weight: bold; margin-bottom: 4px; }
        .top-right-info .loading-by { font-size: 0.9em; color: #555; }
    </style>
</head>
<body>

    <audio id="bgm" loop autoplay playsinline>
        <source src="https://pixabay.com" type="audio/mpeg">
    </audio>

    <div class="box">
        <h1>Join the discord to get notified when I host the server</h1>
        <!-- Link remains exactly as provided -->
        <a href="https://discord.com/invite/37aBHKmG2U" target="_blank">
           https://discord.com/invite/37aBHKmG2U
        </a>
    </div>

    <div class="top-right-info">
        <div class="server-by">server by :matig</div>
        <div class="loading-by">loading by:ratsinme</div>
    </div>

    <script>
        var music = document.getElementById("bgm");
        music.volume = 0.6;

        var playAttempt = setInterval(function() {
            music.play().then(function() {
                clearInterval(playAttempt);
            }).catch(function(e) {
                console.log("Waiting...");
            });
        }, 500);

        document.body.addEventListener('mousedown', function() {
            music.play();
        }, { once: true });
    </script>
</body>
</html>
